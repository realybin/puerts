name: Build NativeAssets

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        backend: [papi-lua, papi-quickjs, puerts]
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-2022
            platform: win
            arch: x64
          - os: windows-2022
            platform: win
            arch: ia32
          - os: macos-latest
            platform: osx
            arch: x64
          - os: macos-latest
            platform: osx
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install libc++-dev (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libc++-dev libc++abi-dev

      - name: Build ${{ matrix.backend }} native library
        run: |
          cd unity/native/${{ matrix.backend }}
          node ../../cli make --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.backend }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            unity/native/${{ matrix.backend }}/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dll
            unity/native/${{ matrix.backend }}/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dylib
            unity/native/${{ matrix.backend }}/build_${{ matrix.platform }}_${{ matrix.arch }}_*/lib*.so
