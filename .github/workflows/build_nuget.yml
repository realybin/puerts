name: Build All NativeAssets

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      #NATIVE_BACKENDS: papi-lua papi-quickjs papi-v8 puerts
      NATIVE_BACKENDS: puerts papi-lua papi-quickjs papi-v8
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-2022
            platform: win
            arch: x64
          - os: windows-2022
            platform: win
            arch: ia32
          - os: macos-latest
            platform: osx
            arch: x64
          - os: macos-latest
            platform: osx
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install libc++-dev (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libc++-dev libc++abi-dev

      - name: Build all native backends (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -ex
          backends="${NATIVE_BACKENDS}"
          repo_root=$(pwd)
          for backend in $backends; do
            echo "Building $backend for ${{ matrix.platform }}-${{ matrix.arch }}"
            cd "$repo_root/unity/native/$backend"
            if [ "$backend" = "papi-v8" ]; then
              #NOTE：v8加需要指定 --backend 参数
              node ../../cli make --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --backend v8_9.4.146.24
              # node ../../cli make --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
            else
              node ../../cli make --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
            fi
            cd "$repo_root"
          done

      - name: Build all native backends (Windows)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = "Stop"
          $backends = $env:NATIVE_BACKENDS.Split(" ")
          $repoRoot = (Get-Location)
          foreach ($backend in $backends) {
            Write-Host "Building $backend for ${{ matrix.platform }}-${{ matrix.arch }}"
            Set-Location "$repoRoot/unity/native/$backend"
            if ($backend -eq "papi-v8") {
              #NOTE：v8加需要指定 --backend 参数
              node ../../cli make --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --backend v8_9.4.146.24
              # node ../../cli make --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
            } else {
              node ../../cli make --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
            }
            Set-Location $repoRoot
          }
        shell: pwsh
      
        # See: https://github.com/Tencent/puerts/blob/e230b37c313c62185ceb5207c37e79e53e1afada/unity/cli/make.mjs#L173
        # mv(`${CMAKE_BUILD_PATH}/${options.config}/lib${cmakeAddedLibraryName}.dylib`, `${CMAKE_BUILD_PATH}/${options.config}/${cmakeAddedLibraryName}.bundle`);
        # generated builds /Users/runner/work/puerts/puerts/unity/native/puerts/build_osx_x64_puerts/Release/libPuertsCore.dylib
        # moving to bundle: /Users/runner/work/puerts/puerts/unity/native/puerts/build_osx_x64_puerts/Release/PuertsCore.bundle
        # Rename macOS bundle format to dylib files to ensure upload-artifact works correctly
      - name: Process macOS native artifacts
        if: runner.os == 'macOS'
        run: |
          set -ex
          for backend in $NATIVE_BACKENDS; do
            echo "Processing $backend for ${{ matrix.platform }}-${{ matrix.arch }}"
            bundle_path="unity/native/$backend/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.bundle"
            if compgen -G "$bundle_path" > /dev/null; then
              echo "Renaming bundle to dylib"
              for bundle in $bundle_path; do
                if [ -e "$bundle" ]; then
                  mv "$bundle" "${bundle%.bundle}.dylib"
                fi
              done
            fi
          done
      
      - name: Upload all native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natives-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            unity/native/papi-lua/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dll
            unity/native/papi-lua/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dylib
            unity/native/papi-lua/build_${{ matrix.platform }}_${{ matrix.arch }}_*/lib*.so
            unity/native/papi-quickjs/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dll
            unity/native/papi-quickjs/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dylib
            unity/native/papi-quickjs/build_${{ matrix.platform }}_${{ matrix.arch }}_*/lib*.so
            unity/native/papi-v8/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dll
            unity/native/papi-v8/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dylib
            unity/native/papi-v8/build_${{ matrix.platform }}_${{ matrix.arch }}_*/lib*.so
            unity/native/puerts/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dll
            unity/native/puerts/build_${{ matrix.platform }}_${{ matrix.arch }}_*/Release/*.dylib
            unity/native/puerts/build_${{ matrix.platform }}_${{ matrix.arch }}_*/lib*.so

  pack_nuget:
    name: Pack NuGet (Win)
    needs: build
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_natives
      - name: List downloaded artifacts
        run: |
          dir downloaded_natives

      # - name: Pack NuGet
