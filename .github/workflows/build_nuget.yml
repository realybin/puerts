name: Build NativeAssets Demo

on:
  push:
  pull_request:

jobs:
  build_linux:
    runs-on: ubuntu-latest
    steps:
      - name: Install libc++-dev
        shell: bash
        run: |
          sudo apt-get install clang
          sudo apt-get install libc++-dev
          sudo apt-get install libc++abi-dev
      - uses: actions/checkout@v4
      - name: Build native library (Linux)
        run: |
             cd ./unity/native/
             cd ./papi-quickjs/ && node ../../cli make --backend v8_9.4 --platform linux --arch x64
             cd ../papi-v8/ && node ../../cli make --backend v8_9.4 --platform linux --arch x64
             cd ../puerts/ && node ../../cli make --backend v8_9.4 --platform linux --arch x64
      - name: List all .so files
        run: find unity/native -name "*.so"
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux
          path: unity/native/*/build_linux_x64_*/lib*.so

  build_windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Build native library (Windows)
        run: |
             cd ./unity/native/
             cd ./papi-quickjs/ && node ../../cli make --backend v8_9.4 --platform win --arch x64
             cd ../papi-v8/ && node ../../cli make --backend v8_9.4 --platform win --arch x64
             cd ../puerts/ && node ../../cli make --backend v8_9.4 --platform win --arch x64
      - uses: actions/upload-artifact@v4
        with:
          name: native-win
          path: unity/native/*/build_win_x64_*/Release/*.dll

  build_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
  
      - name: Build native library (macOS x64)
        run: |
          cd ./unity/native/
          rm -rf papi-quickjs/build_* papi-v8/build_* puerts/build_*
          cd ./papi-quickjs/ && node ../../cli make --backend v8_9.4 --platform osx --arch x64
          cd ../papi-v8/ && node ../../cli make --backend v8_9.4 --platform osx --arch x64
          cd ../puerts/ && node ../../cli make --backend v8_9.4 --platform osx --arch x64
          cd ..
          mkdir -p ../../artifacts/x64/papi-quickjs ../../artifacts/x64/papi-v8 ../../artifacts/x64/puerts
          cp papi-quickjs/build_osx_x64_*/lib*.dylib ../../artifacts/x64/papi-quickjs/ || true
          cp papi-v8/build_osx_x64_*/lib*.dylib ../../artifacts/x64/papi-v8/ || true
          cp puerts/build_osx_x64_*/lib*.dylib ../../artifacts/x64/puerts/ || true

      - name: Build native library (macOS arm64)
        run: |
          cd ./unity/native/
          rm -rf papi-quickjs/build_* papi-v8/build_* puerts/build_*
          cd ./papi-quickjs/ && node ../../cli make --backend v8_9.4 --platform osx --arch arm64
          cd ../papi-v8/ && node ../../cli make --backend v8_9.4 --platform osx --arch arm64
          cd ../puerts/ && node ../../cli make --backend v8_9.4 --platform osx --arch arm64
          cd ..
          mkdir -p ../../artifacts/arm64/papi-quickjs ../../artifacts/arm64/papi-v8 ../../artifacts/arm64/puerts
          cp papi-quickjs/build_osx_arm64_*/lib*.dylib ../../artifacts/arm64/papi-quickjs/ || true
          cp papi-v8/build_osx_arm64_*/lib*.dylib ../../artifacts/arm64/papi-v8/ || true
          cp puerts/build_osx_arm64_*/lib*.dylib ../../artifacts/arm64/puerts/ || true

      - name: Upload all native macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-macOS
          path: |
            unity/artifacts/**

  pack:
    runs-on: ubuntu-latest
    needs: [build_linux, build_windows, build_macos]
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: native/linux
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: native-windows
          path: native/win
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: native-macOS
          path: native/macOS
      - name: List all native assets
        run: ls -R native
      - name: Pack NuGet (no publish)
        run: |
          dotnet tool install -g nuget
          nuget pack nuget.nuspec -OutputDirectory out
      - name: Show nupkg
        run: ls -l out
