name: Build NativeAssets Demo

on:
  push:
  pull_request:

jobs:
  build_linux_x64:
    runs-on: ubuntu-latest
    steps:
      - name: Install libc++-dev
        shell: bash
        run: |
          sudo apt-get install clang
          sudo apt-get install libc++-dev
          sudo apt-get install libc++abi-dev
      - uses: actions/checkout@v4
      - name: Build native library
        run: |
             cd ./unity/native_src/
             node ../cli make --backend quickjs --platform linux --arch x64
             node ../cli make --backend v8 --platform linux --arch x64
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: unity/native/build_linux_x64_*/lib*.so

  build_win_x64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Build native library
        run: |
             cd ./unity/native_src/
             node ../cli make --backend quickjs --platform win --arch x64
             node ../cli make --backend v8 --platform win --arch x64
      - uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: unity/native_src/build_win_ia32_*/Release/*.dll

  build_win_x86:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Build native library
        run: |
             cd ./unity/native_src/
             node ../cli make --backend quickjs --platform win --arch ia32
             node ../cli make --backend v8 --platform win --arch ia32
      - uses: actions/upload-artifact@v4
        with:
          name: native-win-x86
          path: unity/native_src/build_win_ia32_*/Release/*.dll

  build_macos_x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
  
      - name: Build native library
        run: |
          cd ./unity/native_src/
          node ../cli make --backend quickjs --platform osx --arch x64
          node ../cli make --backend v8 --platform osx --arch x64
      - name: Upload all native macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-macOS
          path: unity/native/build_osx_x64_*/lib*.so

  pack:
    runs-on: ubuntu-latest
    needs: [build_linux_x64, build_win_x64, build_win_x86, build_macos_x64]
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: native/nlinux-x64
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: native-windows
          path: native/win
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: native-macOS
          path: native/macOS
      - name: List all native assets
        run: ls -R native
      - name: Pack NuGet (no publish)
        run: |
          dotnet tool install -g nuget
          nuget pack nuget.nuspec -OutputDirectory out
      - name: Show nupkg
        run: ls -l out
